        <main>
            <h1>Contact me</h1>

            <form>
                <label for="name">Full name</label>
                <input type="text" id="name" name="full name"><br><br>
                <label for="email">EmaIL address</label>
                <input type="email" id="email" name="Email address"><br><br>
                <label for="phone">Phone number</label>
                <input type="phone" id="number" name="Phone number"><br><br>
                <label for="subject">Subject</label>
                <input type="subject" id="subject" placeholder="Enter the subject"><br><br>
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="10" placeholder="Type your message here"></textarea><br><br>
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">i agree to the terms and conditions</label><br><br>
            </form>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </main>
